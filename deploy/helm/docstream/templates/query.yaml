{{- /*
The read side. This is the deployment that exists to be scaled independently of
ingest — the concrete payoff of the CQRS split, and why the HPA lives here and
not on the write path.
*/}}
{{- $fullname := include "docstream.fullname" . -}}
{{- $cfg := .Values.services.query -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-query
  labels:
    {{- include "docstream.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  {{- if not $cfg.autoscaling.enabled }}
  replicas: {{ $cfg.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "docstream.selectorLabels" (dict "ctx" . "component" "query") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docstream.selectorLabels" (dict "ctx" . "component" "query") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- include "docstream.waitForInfra" . | nindent 6 }}
      containers:
        - name: query
          image: "{{ .Values.image.repository }}/query:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $cfg.port }}
          env:
            {{- include "docstream.env" . | nindent 12 }}
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-query
  labels:
    {{- include "docstream.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $cfg.port }}
      targetPort: http
  selector:
    {{- include "docstream.selectorLabels" (dict "ctx" . "component" "query") | nindent 4 }}
{{- if $cfg.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $fullname }}-query
  labels:
    {{- include "docstream.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $fullname }}-query
  minReplicas: {{ $cfg.autoscaling.minReplicas }}
  maxReplicas: {{ $cfg.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
