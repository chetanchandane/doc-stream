{{- if not .Values.secrets.existingSecret }}
# Rendered from values for local/demo use only. In a real cluster set
# secrets.existingSecret and manage the Secret out of band (Sealed Secrets,
# External Secrets Operator, SOPS) so credentials never live in a values file.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docstream.secretName" . }}
  labels:
    {{- include "docstream.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresPassword: {{ .Values.secrets.postgresPassword | quote }}
  storageAccessKey: {{ .Values.secrets.storageAccessKey | quote }}
  storageSecretKey: {{ .Values.secrets.storageSecretKey | quote }}
  # Empty is allowed so `helm template` and a no-LLM smoke test work; the
  # enrichment worker and query API need real keys to do anything useful.
  embeddingApiKey: {{ .Values.secrets.embeddingApiKey | quote }}
  llmApiKey: {{ .Values.secrets.llmApiKey | quote }}
{{- end }}
