# Local infrastructure for DocStream.
#   docker compose up -d      # start everything
#   make topics               # create the Kafka topics
#   docker compose ps         # health
#
# Kafka runs in KRaft mode (no ZooKeeper). Postgres holds job state; Redis is
# the idempotency store; Qdrant holds vectors (used from Week 2). kafka-ui is a
# browser UI at http://localhost:8080 for inspecting topics and messages.

name: docstream

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: docstream-kafka
    ports:
      - "9092:9092" # host clients connect here
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # INTERNAL is for containers on this network; EXTERNAL is for host apps.
      KAFKA_LISTENERS: INTERNAL://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Force explicit topic creation so the schema stays intentional.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: docstream-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: docstream
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"

  postgres:
    image: postgres:16
    container_name: docstream-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: docstream
      POSTGRES_PASSWORD: docstream
      POSTGRES_DB: docstream
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docstream -d docstream"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: docstream-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: docstream-qdrant
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrantdata:/qdrant/storage

  # S3-compatible object storage. Stands in for AWS S3 so the services stay
  # stateless: any pod can resolve any s3:// URI, with no shared filesystem.
  minio:
    image: minio/minio:latest
    container_name: docstream-minio
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console (user/pass below)
    environment:
      MINIO_ROOT_USER: docstream
      MINIO_ROOT_PASSWORD: docstream123
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:
