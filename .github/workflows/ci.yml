name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  # A new push to the same branch cancels the previous run.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # --------------------------------------------------------------------------
  # Fast feedback: lint, formatting, and lockfile freshness.
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        # --frozen fails if uv.lock is out of sync with pyproject.toml, which is
        # exactly how an undeclared dependency (like python-multipart) slips
        # through locally and then breaks a clean container build.
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

  # --------------------------------------------------------------------------
  # Unit tests: fully faked, no Docker, seconds.
  # --------------------------------------------------------------------------
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest -q

  # --------------------------------------------------------------------------
  # Integration tests against REAL Kafka, Postgres, Qdrant, and MinIO.
  # These exist because fakes can only assert what we BELIEVE an API does —
  # two production bugs (invalid Qdrant point ids, a removed client method)
  # passed the unit suite and failed on the first real call.
  # GitHub runners ship with Docker, so testcontainers works out of the box.
  # --------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Run integration tests
        run: uv run pytest -m integration -v

  # --------------------------------------------------------------------------
  # Chart validation. Cheap, and catches template errors before they become a
  # stalled `helm install` against a real cluster.
  # --------------------------------------------------------------------------
  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/docstream

      - name: Render with default values
        run: helm template docstream deploy/helm/docstream > /tmp/rendered.yaml

      - name: Render with bundled infra disabled
        # The external.* path is easy to break unnoticed, since local runs
        # always use infra.enabled=true.
        run: |
          helm template docstream deploy/helm/docstream \
            --set infra.enabled=false \
            --set external.kafkaBootstrap=kafka:9092 \
            --set external.postgresDsn=postgresql+asyncpg://u:p@pg:5432/db \
            --set external.qdrantUrl=http://qdrant:6333 \
            --set external.storageEndpoint=http://s3:9000 > /dev/null

      - name: Validate manifests against the Kubernetes API schema
        uses: instrumenta/kubeval-action@master
        continue-on-error: true
        with:
          files: /tmp/rendered.yaml

  # --------------------------------------------------------------------------
  # Build every image. On PRs this only proves the Dockerfile works; pushing
  # happens in release.yml on main.
  # --------------------------------------------------------------------------
  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, extraction, enrichment, projector, query, migrate, topics]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.service }}
          push: false
          tags: docstream/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # --------------------------------------------------------------------------
  # The real end-to-end gate: build the images, install the chart on a kind
  # cluster, and push a document through the pipeline.
  #
  # Uses fake API keys deliberately — the enrichment worker will fail to reach
  # the LLM, so this asserts the DEPLOYMENT converges (pods Ready, migrations
  # and topics applied, APIs serving), not the AI behaviour. That's the part
  # that broke repeatedly by hand.
  # --------------------------------------------------------------------------
  e2e:
    name: Deploy to kind
    runs-on: ubuntu-latest
    needs: [build, helm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build images into the local docker daemon
        run: |
          for svc in gateway extraction enrichment projector query migrate topics; do
            docker build --target "$svc" -t "docstream/$svc:dev" --load .
          done

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          config: deploy/kind/kind-config.yaml
          cluster_name: docstream

      - name: Load images into kind
        run: |
          for svc in gateway extraction enrichment projector query migrate topics; do
            kind load docker-image "docstream/$svc:dev" --name docstream
          done

      - name: Install chart
        run: |
          helm upgrade --install docstream deploy/helm/docstream \
            --set secrets.embeddingApiKey=ci-not-a-real-key \
            --set secrets.llmApiKey=ci-not-a-real-key \
            --wait --timeout 15m

      - name: Assert bootstrap jobs completed
        run: |
          kubectl wait --for=condition=complete --timeout=5m \
            job -l app.kubernetes.io/component=migrate
          kubectl wait --for=condition=complete --timeout=5m \
            job -l app.kubernetes.io/component=topics

      - name: Assert no pod restarted (dependency gating works)
        run: |
          set -euo pipefail
          restarts=$(kubectl get pods -l app.kubernetes.io/part-of=docstream \
            -o jsonpath='{range .items[*]}{.status.containerStatuses[*].restartCount}{"\n"}{end}' \
            | tr ' ' '\n' | grep -v '^$' | sort -rn | head -1)
          echo "max restart count: ${restarts:-0}"
          test "${restarts:-0}" -eq 0

      - name: Smoke-test both APIs
        run: |
          kubectl port-forward svc/docstream-gateway 8000:8000 &
          kubectl port-forward svc/docstream-query 8001:8001 &
          sleep 8
          curl -fsS http://localhost:8000/healthz
          curl -fsS http://localhost:8001/healthz
          # Write path: the gateway must accept the upload and create a job.
          echo "The security deposit is 2000 dollars." > /tmp/lease.txt
          job=$(curl -fsS -X POST http://localhost:8000/documents \
                  -F "file=@/tmp/lease.txt" | jq -r .job_id)
          test -n "$job"
          curl -fsS "http://localhost:8000/jobs/$job" | jq -e '.status'
          # Read path: the read model responds (may be empty; enrichment needs
          # real API keys, which CI deliberately does not have).
          curl -fsS http://localhost:8001/documents | jq -e 'type == "array"'

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get pods,jobs,svc -o wide || true
          kubectl describe pods || true
          kubectl logs -l app.kubernetes.io/part-of=docstream --all-containers --tail=200 || true
