name: Release

# Publishes the five service images (plus the two bootstrap images) to the
# GitHub Container Registry. GHCR needs no extra secrets — GITHUB_TOKEN is
# enough — so there is nothing to configure to make this work.
#
# To publish elsewhere (Docker Hub, ECR), change REGISTRY/IMAGE_PREFIX and swap
# the login step's credentials for repository secrets.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, extraction, enrichment, projector, query, migrate, topics]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          # main -> :main and :sha-<short>; a v1.2.3 tag -> :1.2.3, :1.2, :latest
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
